<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DLP</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: "Segoe UI", Arial, sans-serif;
      --bg: #0d1117;
      --surface: #151b23;
      --text-primary: #f2f7ff;
      --text-secondary: #b7c5d8;
      --border: #314155;
      --border-strong: #496178;
      --accent: #6f8aa8;
      --accent-active: #2f81f7;
      --accent-interactive: #58a6ff;
    }

    body {
      width: 280px;
      margin: 0;
      background: var(--bg);
      color: var(--text-primary);
    }

    .shell {
      padding: 14px 16px;
    }

    .header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 4px;
    }

    .title {
      margin: 0;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0;
    }

    .version {
      color: var(--text-secondary);
      font-size: 12px;
      font-weight: 400;
    }

    .subtitle {
      margin: 0 0 12px;
      color: var(--text-secondary);
      font-size: 12px;
      line-height: 1.35;
    }

    .divider {
      height: 1px;
      margin: 12px 0;
      background: var(--border-strong);
      border: 0;
    }

    .settings {
      display: grid;
      gap: 10px;
    }

    .setting {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 34px;
    }

    .setting.is-disabled {
      opacity: 0.55;
    }

    .setting-title {
      margin: 0;
      font-size: 13px;
      font-weight: 500;
    }

    .setting-select {
      position: relative;
      flex: 0 0 132px;
      max-width: 132px;
    }

    .setting-select::after {
      content: "";
      position: absolute;
      top: 50%;
      right: 10px;
      width: 0;
      height: 0;
      border-left: 4px solid transparent;
      border-right: 4px solid transparent;
      border-top: 5px solid var(--text-secondary);
      transform: translateY(-35%);
      pointer-events: none;
    }

    .setting-select select {
      width: 100%;
      height: 32px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--surface);
      color: var(--text-primary);
      font: 500 12px "Segoe UI", Arial, sans-serif;
      padding: 0 28px 0 10px;
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
    }

    .setting-select select:hover,
    .setting-select select:focus {
      border-color: var(--accent-interactive);
      outline: none;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .actions button {
      height: 34px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--surface);
      color: var(--text-primary);
      font: 600 12px "Segoe UI", Arial, sans-serif;
      cursor: pointer;
      transition: border-color 150ms ease, color 150ms ease;
    }

    .actions button:hover {
      border-color: var(--accent-interactive);
      color: var(--accent-interactive);
    }

    .actions .wide {
      grid-column: span 2;
    }

    .switch {
      position: relative;
      flex: 0 0 auto;
      width: 44px;
      height: 24px;
    }

    .switch input {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }

    .switch input:disabled,
    .switch input:disabled + .track {
      cursor: default;
    }

    .track {
      position: absolute;
      inset: 0;
      border-radius: 999px;
      background: var(--border-strong);
      cursor: pointer;
      transition: background 150ms ease;
    }

    .track::after {
      content: "";
      position: absolute;
      top: 3px;
      left: 3px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--text-primary);
      transition: transform 150ms ease;
    }

    .switch input:checked + .track {
      background: var(--accent-active);
    }

    .switch input:checked + .track::after {
      transform: translateX(20px);
    }

    .switch input:focus-visible + .track {
      outline: 2px solid var(--accent-interactive);
      outline-offset: 2px;
    }

    .status {
      min-height: 16px;
      margin-top: 10px;
      color: var(--text-secondary);
      font-size: 11px;
      line-height: 1.35;
    }

    .footer {
      display: grid;
      gap: 2px;
      color: var(--text-secondary);
      font-size: 11px;
      line-height: 1.45;
    }

    .footer a {
      color: var(--accent-interactive);
      text-decoration: none;
    }

    .footer a:hover {
      color: var(--text-primary);
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <main class="shell">
    <div class="header">
      <h1 class="title">DLP</h1>
      <span id="version" class="version"></span>
    </div>

    <p class="subtitle">Quick controls</p>

    <hr class="divider">

    <section class="settings">
      <div class="setting">
        <p id="silentDownloadLabel" class="setting-title">Silent download</p>
        <label class="switch" title="Silent download">
          <input id="silentDownload" type="checkbox" role="switch" aria-labelledby="silentDownloadLabel">
          <span class="track"></span>
        </label>
      </div>

      <div class="setting">
        <p id="autoHideOverlayLabel" class="setting-title">Auto hide</p>
        <label class="switch" title="Auto hide">
          <input id="autoHideOverlay" type="checkbox" role="switch" aria-labelledby="autoHideOverlayLabel">
          <span class="track"></span>
        </label>
      </div>

      <div class="setting">
        <p id="experimentalAllSitesLabel" class="setting-title">All sites</p>
        <label class="switch" title="All sites">
          <input id="experimentalAllSites" type="checkbox" role="switch" aria-labelledby="experimentalAllSitesLabel">
          <span class="track"></span>
        </label>
      </div>

      <div id="deepScannerRow" class="setting">
        <p id="deepScannerLabel" class="setting-title">Deep scanner</p>
        <label class="switch" title="Deep scanner">
          <input id="deepScanner" type="checkbox" role="switch" aria-labelledby="deepScannerLabel">
          <span class="track"></span>
        </label>
      </div>

      <div class="setting">
        <p id="browserCookiesLabel" class="setting-title">Browser cookies</p>
        <label class="switch" title="Browser cookies">
          <input id="browserCookies" type="checkbox" role="switch" aria-labelledby="browserCookiesLabel">
          <span class="track"></span>
        </label>
      </div>

      <div id="cookieBrowserRow" class="setting">
        <label class="setting-title" for="cookieBrowser">Cookie browser</label>
        <div class="setting-select">
          <select id="cookieBrowser" title="Cookie browser">
            <option value="brave">Brave</option>
            <option value="chrome">Chrome</option>
            <option value="edge">Edge</option>
            <option value="firefox">Firefox</option>
            <option value="opera">Opera</option>
            <option value="vivaldi">Vivaldi</option>
            <option value="chromium">Chromium</option>
            <option value="whale">Whale</option>
          </select>
        </div>
      </div>

      <div class="setting">
        <label class="setting-title" for="overlayPosition">Button position</label>
        <div class="setting-select">
          <select id="overlayPosition" title="Button position">
            <option value="auto">Auto</option>
            <option value="top-right">Top right</option>
            <option value="top-center">Top center</option>
            <option value="top-left">Top left</option>
            <option value="bottom-right">Bottom right</option>
            <option value="bottom-center">Bottom center</option>
            <option value="bottom-left">Bottom left</option>
          </select>
        </div>
      </div>
    </section>

    <hr class="divider">

    <section class="actions">
      <button id="openApp" type="button">Open DLP App</button>
      <button id="openFolder" type="button">Open folder</button>
      <button id="openDashboard" class="wide" type="button">Downloads</button>
    </section>

    <div id="status" class="status" role="status" aria-live="polite">Loading</div>

    <hr class="divider">

    <div class="footer">
      <div>Developed by <a id="ibrahimLink" href="https://ibrhub.net">IBRAHIM</a></div>
      <div>Source <a id="sourceLink" href="https://github.com/IBRHUB/DLP">IBRHUB/DLP</a></div>
    </div>
  </main>

  <script src="popup.js"></script>
</body>
</html>
