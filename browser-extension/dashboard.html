<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DLP Downloads</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: "Segoe UI", Arial, sans-serif;
      --space-1: 4px;
      --space-2: 8px;
      --space-3: 12px;
      --space-4: 16px;
      --space-5: 24px;
      --space-6: 32px;
      --bg: #0d1117;
      --surface: #151b23;
      --text-primary: #f2f7ff;
      --text-secondary: #b7c5d8;
      --border: #314155;
      --border-strong: #496178;
      --accent: #6f8aa8;
      --accent-active: #2f81f7;
      --accent-interactive: #58a6ff;
      --surface-muted: #151b23;
      --ink: var(--text-primary);
      --muted: var(--text-secondary);
      --topbar-height: 86px;
      --preview-max-height: calc(100vh - 96px);
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      overflow: hidden;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text-primary);
    }

    main {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      width: min(100% - clamp(28px, 4vw, 48px), 1560px);
      height: 100vh;
      max-width: 1560px;
      margin: 0 auto;
      padding: clamp(var(--space-4), 2vw, var(--space-5)) 0;
      overflow: hidden;
    }

    .topbar {
      display: grid;
      gap: var(--space-2);
      padding-bottom: var(--space-4);
      background: var(--bg);
      border-bottom: 1px solid color-mix(in srgb, var(--border) 70%, transparent);
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-4);
    }

    .path {
      min-height: 16px;
      margin: 0;
      color: var(--text-secondary);
      font-size: 12px;
      overflow-wrap: anywhere;
    }

    h1 {
      margin: 0;
      font-size: 22px;
      letter-spacing: 0;
    }

    button {
      height: 34px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--surface);
      color: var(--text-primary);
      font: 650 13px "Segoe UI", Arial, sans-serif;
      padding: 0 13px;
      cursor: pointer;
      transition: border-color 150ms ease, color 150ms ease;
    }

    button:hover {
      border-color: var(--accent-interactive);
      color: var(--accent-interactive);
    }

    button:disabled {
      cursor: default;
      color: var(--text-secondary);
      border-color: var(--border);
      background: var(--surface);
      opacity: 0.6;
    }

    button:focus-visible,
    .item:focus-visible {
      outline: 2px solid var(--accent-interactive);
      outline-offset: 2px;
    }

    .list {
      display: grid;
      height: 100%;
      gap: var(--space-2);
      align-content: start;
      min-width: 0;
      overflow: auto;
      padding-right: var(--space-1);
      scrollbar-color: transparent transparent;
      scrollbar-gutter: stable;
      scrollbar-width: thin;
      transition: scrollbar-color 160ms ease;
    }

    .list:hover,
    .list:focus-within {
      scrollbar-color: color-mix(in srgb, var(--border-strong) 85%, transparent) transparent;
    }

    .list::-webkit-scrollbar {
      width: 10px;
    }

    .list::-webkit-scrollbar-track {
      background: transparent;
    }

    .list::-webkit-scrollbar-thumb {
      min-height: 48px;
      border: 3px solid transparent;
      border-radius: 999px;
      background: transparent;
      background-clip: content-box;
      transition: background-color 160ms ease;
    }

    .list:hover::-webkit-scrollbar-thumb,
    .list:focus-within::-webkit-scrollbar-thumb {
      background-color: color-mix(in srgb, var(--border-strong) 85%, transparent);
    }

    .list::-webkit-scrollbar-thumb:hover {
      background-color: var(--accent);
    }

    .item {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      padding: var(--space-3);
      cursor: pointer;
      text-align: left;
      color: var(--text-primary);
      transition: border-color 150ms ease;
    }

    .item:hover {
      border-color: var(--accent);
    }

    .item.active {
      border-color: var(--accent-interactive);
      background: color-mix(in srgb, var(--accent-interactive) 10%, var(--surface));
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-3);
    }

    .title {
      min-width: 0;
      font-size: 15px;
      font-weight: 700;
      overflow-wrap: anywhere;
    }

    .meta {
      margin-top: 7px;
      color: var(--text-secondary);
      font-size: 12px;
      overflow-wrap: anywhere;
    }

    .empty {
      border: 1px dashed var(--border-strong);
      border-radius: 8px;
      padding: var(--space-5);
      color: var(--text-secondary);
      background: var(--surface);
    }

    .ok {
      color: var(--accent-interactive);
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(248px, clamp(300px, 24vw, 340px)) minmax(0, 1fr);
      gap: var(--space-4);
      align-items: start;
      min-height: 0;
      padding-top: var(--space-4);
      overflow: hidden;
    }

    .viewer {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      min-width: 0;
      min-height: 0;
      height: 100%;
      overflow: hidden;
    }

    .viewer-frame {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-width: 0;
      max-height: var(--preview-max-height);
      aspect-ratio: 16 / 9;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #000000;
      color: var(--text-secondary);
      font-size: 13px;
      overflow: hidden;
    }

    .viewer-frame::after {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      content: "";
      opacity: 0;
      pointer-events: none;
      transition: opacity 140ms ease;
      z-index: 2;
    }

    .viewer-frame.loading {
      border-color: var(--border);
      background: var(--surface);
    }

    .viewer-frame.loading::after {
      opacity: 1;
    }

    .viewer-message {
      padding: var(--space-4);
      text-align: center;
      color: var(--text-primary);
      line-height: 1.45;
      max-width: 42ch;
    }

    .viewer-message strong {
      display: block;
      margin-bottom: var(--space-1);
      font-size: 15px;
    }

    .viewer-message span {
      color: var(--text-secondary);
      font-size: 12px;
    }

    .viewer-frame.empty,
    .viewer-frame.audio {
      width: min(100%, 680px);
      min-height: min(320px, var(--preview-max-height));
      aspect-ratio: auto;
      background: var(--surface);
    }

    .viewer-frame.landscape,
    .viewer-frame.ultrawide {
      width: 100%;
      aspect-ratio: var(--media-ratio, 16 / 9);
    }

    .viewer-frame.portrait {
      width: auto;
      height: min(var(--preview-max-height), 820px);
      max-width: min(100%, 760px);
      aspect-ratio: var(--media-ratio, 9 / 16);
      margin-left: auto;
      margin-right: auto;
    }

    .viewer-frame.tall {
      width: auto;
      height: min(var(--preview-max-height), 820px);
      max-width: min(100%, 500px);
      aspect-ratio: var(--media-ratio, 9 / 16);
      margin-left: auto;
      margin-right: auto;
    }

    .viewer-frame.square {
      width: min(100%, var(--preview-max-height), 760px);
      aspect-ratio: 1 / 1;
      margin-left: auto;
      margin-right: auto;
    }

    @media (max-width: 1180px) {
      .layout {
        grid-template-columns: minmax(236px, 300px) minmax(0, 1fr);
        gap: var(--space-3);
      }

      .viewer-frame.empty,
      .viewer-frame.audio {
        width: min(100%, 600px);
      }
    }

    .viewer-frame video {
      width: 100%;
      height: 100%;
      display: block;
      background: #000000;
      object-fit: contain;
      opacity: 1;
      transition: opacity 140ms ease;
    }

    .viewer-frame audio {
      width: 100%;
      max-width: 420px;
    }

    .viewer-frame video[hidden],
    .viewer-frame audio[hidden],
    .viewer-message[hidden] {
      display: none;
    }

    .viewer-play {
      position: absolute;
      top: var(--space-3);
      right: var(--space-3);
      z-index: 3;
      background: var(--surface);
      border-color: var(--border);
      color: var(--text-primary);
    }

    .viewer-play:disabled {
      visibility: hidden;
    }

    .viewer-frame.loading .viewer-play {
      visibility: hidden;
    }

    @media (max-width: 920px) {
      main {
        padding: var(--space-4) 0;
      }

      .topbar {
        padding-bottom: var(--space-3);
      }

      .layout {
        grid-template-areas:
          "viewer"
          "list";
        grid-template-columns: 1fr;
        grid-template-rows: auto minmax(0, 1fr);
      }

      .list {
        grid-area: list;
        min-height: 0;
        overflow: auto;
        padding-right: 0;
      }

      .viewer {
        grid-area: viewer;
        display: block;
        height: auto;
        overflow: visible;
      }

      .viewer-frame {
        --preview-max-height: 70vh;
      }

      .viewer-frame.empty,
      .viewer-frame.audio {
        width: 100%;
      }

      .viewer-play {
        top: var(--space-2);
        right: var(--space-2);
      }
    }

    @media (max-width: 560px) {
      main {
        width: min(100% - 24px, 1560px);
        padding: var(--space-3) 0;
      }

      header {
        gap: var(--space-2);
      }

      h1 {
        font-size: 20px;
      }

      button {
        min-width: 44px;
      }

      .viewer-frame.empty,
      .viewer-frame.audio {
        min-height: min(280px, var(--preview-max-height));
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .viewer-frame::after,
      .viewer-frame video {
        transition: none;
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="topbar">
      <header>
        <h1>DLP Downloads</h1>
        <button id="refreshVideos" type="button">Refresh</button>
      </header>
      <div id="downloadPath" class="path"></div>
    </div>

    <div class="layout">
      <section id="videos" class="list" aria-label="Downloaded files"></section>

      <section class="viewer" aria-label="Selected download">
        <div id="viewerFrame" class="viewer-frame empty">
          <div id="viewerMessage" class="viewer-message">
            <strong>Select a file</strong>
            <span>Choose a download from the list</span>
          </div>
          <button id="viewerPlay" class="viewer-play" type="button" disabled>Open</button>
        </div>
      </section>
    </div>
  </main>

  <script src="dashboard.js"></script>
</body>
</html>
