<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DLP Downloads</title>
  <style>
    :root {
      color-scheme: light;
      font-family: "Segoe UI", Arial, sans-serif;
    }

    body {
      margin: 0;
      background: #fafbfc;
      color: #1f2937;
    }

    main {
      max-width: 980px;
      margin: 0 auto;
      padding: 28px 22px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    .path {
      margin: -8px 0 18px;
      color: #6b7280;
      font-size: 12px;
      overflow-wrap: anywhere;
    }

    h1 {
      margin: 0;
      font-size: 22px;
      letter-spacing: 0;
    }

    button {
      height: 34px;
      border: 1px solid #c6cfda;
      border-radius: 6px;
      background: #ffffff;
      color: #1f2937;
      font: 650 13px "Segoe UI", Arial, sans-serif;
      padding: 0 13px;
      cursor: pointer;
    }

    button:hover {
      border-color: #1665d8;
      color: #1665d8;
    }

    .list {
      display: grid;
      gap: 10px;
      align-content: start;
      min-width: 0;
    }

    .item {
      border: 1px solid #d4dce7;
      border-radius: 8px;
      background: #ffffff;
      padding: 14px;
      cursor: pointer;
      text-align: left;
    }

    .item:hover,
    .item.active {
      border-color: #1665d8;
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }

    .title {
      min-width: 0;
      font-size: 15px;
      font-weight: 700;
      overflow-wrap: anywhere;
    }

    .meta {
      margin-top: 7px;
      color: #6b7280;
      font-size: 12px;
      overflow-wrap: anywhere;
    }

    .empty {
      border: 1px dashed #c6cfda;
      border-radius: 8px;
      padding: 24px;
      color: #6b7280;
      background: #ffffff;
    }

    .ok {
      color: #166534;
    }

    .error {
      color: #991b1b;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(320px, 42%) minmax(360px, 1fr);
      gap: 16px;
      align-items: start;
    }

    .viewer {
      position: sticky;
      top: 18px;
      min-height: 360px;
      border: 1px solid #d4dce7;
      border-radius: 8px;
      background: #ffffff;
      padding: 18px;
    }

    .viewer-frame {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 220px;
      max-height: 560px;
      margin-bottom: 16px;
      border: 1px solid #d4dce7;
      border-radius: 8px;
      background: #f3f5f8;
      color: #6b7280;
      font-size: 13px;
      overflow: hidden;
    }

    .viewer-frame video {
      width: 100%;
      max-height: 540px;
      border-radius: 7px;
      background: #000000;
      object-fit: contain;
    }

    .viewer-frame video.portrait {
      width: auto;
      max-width: 72%;
      height: min(540px, 70vh);
    }

    .viewer-frame video.landscape {
      width: 100%;
      height: auto;
    }

    .viewer-frame audio {
      width: 100%;
      max-width: 420px;
    }

    .viewer-title {
      margin: 0 0 8px;
      font-size: 18px;
      overflow-wrap: anywhere;
    }

    .viewer-actions {
      display: flex;
      justify-content: flex-start;
      margin-top: 16px;
    }

    @media (max-width: 820px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .viewer {
        position: static;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>DLP Downloads</h1>
      <button id="refreshVideos" type="button">Refresh</button>
    </header>

    <div id="downloadPath" class="path"></div>
    <div class="layout">
      <section id="videos" class="list"></section>

      <section class="viewer" aria-live="polite">
        <div id="viewerFrame" class="viewer-frame">Select a video</div>
        <h2 id="viewerTitle" class="viewer-title">No video selected</h2>
        <div id="viewerMeta" class="meta"></div>
        <div id="viewerFile" class="meta"></div>
        <div class="viewer-actions">
          <button id="viewerPlay" type="button" disabled>Play</button>
        </div>
      </section>
    </div>
  </main>

  <script src="dashboard.js"></script>
</body>
</html>
